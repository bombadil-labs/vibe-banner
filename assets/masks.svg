<svg xmlns="http://www.w3.org/2000/svg" width="128" height="64" viewBox="0 0 128 64">
  <!-- The two masks, as a 2-cell sheet: comedy in cell 0, tragedy in cell 1, each 64x64.
       Drawn rather than lifted from an emoji font, so they are the same on every platform,
       carry real alpha, and can be posed independently. Playful, not solemn: gold trim,
       a blush, a tear. Regenerate nothing — this file IS the art. -->
  <defs>
    <linearGradient id="cf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6e6"/><stop offset="1" stop-color="#f0dcc0"/>
    </linearGradient>
    <linearGradient id="tf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4eef6"/><stop offset="1" stop-color="#ddd0e2"/>
    </linearGradient>
  </defs>

  <!-- ── comedy ───────────────────────────────────────────────────────────── -->
  <g>
    <path d="M32 4c13 0 20 11 20 25 0 17-9 31-20 31S12 46 12 29C12 15 19 4 32 4z"
          fill="url(#cf)" stroke="#c9973a" stroke-width="1.6"/>
    <path d="M32 7c11 0 17 9 17 22" fill="none" stroke="#fffdf6" stroke-width="1.6" opacity=".75"/>
    <circle cx="19" cy="37" r="4.2" fill="#e58c86" opacity=".38"/>
    <circle cx="45" cy="37" r="4.2" fill="#e58c86" opacity=".38"/>
    <path d="M15.5 21q6-5.5 12-1" fill="none" stroke="#7a5326" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M48.5 21q-6-5.5-12-1" fill="none" stroke="#7a5326" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M17 29q5-6 10 0-5 4.5-10 0z" fill="#3b2b1e"/>
    <path d="M37 29q5-6 10 0-5 4.5-10 0z" fill="#3b2b1e"/>
    <path d="M21 40q11 16 22 0-11 7-22 0z" fill="#3b2b1e"/>
    <path d="M24.5 42.5q7.5 4 15 0" fill="none" stroke="#fff4e0" stroke-width="1.5" opacity=".55"/>
    <path d="M32 10.5l2.6 3-2.6 3-2.6-3z" fill="#d9a441"/>
  </g>

  <!-- ── tragedy ──────────────────────────────────────────────────────────── -->
  <g transform="translate(64 0)">
    <path d="M32 4c13 0 20 11 20 25 0 17-9 31-20 31S12 46 12 29C12 15 19 4 32 4z"
          fill="url(#tf)" stroke="#7f6ea0" stroke-width="1.6"/>
    <path d="M32 7c11 0 17 9 17 22" fill="none" stroke="#fffdff" stroke-width="1.6" opacity=".6"/>
    <path d="M15.5 17.5q6 2 11.5 5.5" fill="none" stroke="#4c3f63" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M48.5 17.5q-6 2-11.5 5.5" fill="none" stroke="#4c3f63" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M17 30q5-4.5 10 0-5 6-10 0z" fill="#2f2740"/>
    <path d="M37 30q5-4.5 10 0-5 6-10 0z" fill="#2f2740"/>
    <path d="M21 47q11-16 22 0-11-7-22 0z" fill="#2f2740"/>
    <path d="M24.5 44.5q7.5-4 15 0" fill="none" stroke="#efe6f4" stroke-width="1.5" opacity=".45"/>
    <path d="M22 36c1.6 2.4 2.6 3.9 2.6 5.1a2.6 2.6 0 1 1-5.2 0c0-1.2 1-2.7 2.6-5.1z" fill="#7fa8d8"/>
    <path d="M32 10.5l2.6 3-2.6 3-2.6-3z" fill="#9a86bd"/>
  </g>
</svg>
